name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      mysqldb:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: fakepersonadb
          MYSQL_ROOT_PASSWORD: "123456"
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456 --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: mandatory-one
        run: chmod +x mvnw

      - name: Wait for MySQL
        shell: bash
        run: |
          for i in {1..60}; do
            if docker exec "${{ job.services.mysqldb.id }}" mysqladmin ping -h 127.0.0.1 -uroot -p123456 --silent; then
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become healthy in time"
          docker logs "${{ job.services.mysqldb.id }}"
          exit 1
      
      - name: Seed database
        shell: bash
        run: |
          docker exec -i "${{ job.services.mysqldb.id }}" \
            mysql -uroot -p123456 < mandatory-one/db/mysql/addresses.sql

      - name: Build + test (unit + integration)
        working-directory: mandatory-one
        run: ./mvnw -B spotless:check checkstyle:check test
